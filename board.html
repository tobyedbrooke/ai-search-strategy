<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board — AI Search Strategy</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #5b6ef5;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --card-radius: 10px;

    /* pillar colours */
    --it: #818cf8;   /* Internal·Technical */
    --in: #34d399;   /* Internal·Non-Technical */
    --et: #f472b6;   /* External·Trustpilot */
    --ee: #fb923c;   /* External·Editorial */
    --ew: #60a5fa;   /* External·Wikipedia */
    --ec: #a78bfa;   /* External·Comparison Sites */
    --er: #facc15;   /* External·Reddit */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 8px; height: 52px; }
  nav .brand { font-weight: 700; font-size: 15px; color: var(--text); margin-right: 16px; text-decoration: none; }
  nav a { color: var(--muted); text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; transition: all 0.15s; }
  nav a:hover, nav a.active { background: var(--surface2); color: var(--text); }

  /* TOOLBAR */
  .toolbar { padding: 16px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .toggle-group { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .toggle-btn { padding: 7px 18px; font-size: 13px; font-weight: 600; border: none; background: none; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .toggle-btn.active { background: var(--accent); color: #fff; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4a5de0; color: #fff; border-color: #4a5de0; }
  .spacer { flex: 1; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* KANBAN */
  #kanban { padding: 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: start; }
  @media (max-width: 800px) { #kanban { grid-template-columns: 1fr; } }
  .column { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); }
  .col-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .col-title { font-weight: 700; font-size: 14px; }
  .col-count { background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .cards-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 80px; }
  .task-card { border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: all 0.15s; }
  .task-card:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }
  .task-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
  .priority-urgent { background: rgba(239,68,68,0.2); color: var(--red); }
  .priority-high    { background: rgba(245,158,11,0.2); color: var(--amber); }
  .priority-medium  { background: rgba(34,197,94,0.2); color: var(--green); }
  .priority-low     { background: rgba(148,163,184,0.15); color: var(--muted); }
  .task-dates { font-size: 11px; color: var(--muted); margin-top: 8px; }
  .task-owner { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* GANTT */
  #gantt { padding: 24px; display: none; overflow-x: auto; }
  .gantt-wrap { min-width: 900px; }
  .gantt-header { display: grid; margin-bottom: 8px; }
  .gantt-row { display: grid; align-items: center; margin-bottom: 4px; min-height: 36px; }
  .gantt-task-label { padding: 0 12px; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .gantt-task-label:hover { color: var(--accent); }
  .gantt-bar-cell { position: relative; height: 100%; display: flex; align-items: center; }
  .gantt-bar { height: 24px; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 4px; }
  .gantt-month-label { text-align: center; font-size: 11px; color: var(--muted); font-weight: 600; border-left: 1px solid var(--border); padding: 4px 0; }
  .gantt-grid-line { border-left: 1px dashed var(--border); height: 100%; position: absolute; top: 0; }
  .today-line { border-left: 2px solid var(--accent); height: 100%; position: absolute; top: 0; z-index: 2; opacity: 0.7; }
  .gantt-bg-row { position: absolute; inset: 0; display: grid; pointer-events: none; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 17px; margin-bottom: 20px; }
  .form-row { margin-bottom: 14px; }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  input, select, textarea { width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; }
  textarea { resize: vertical; min-height: 60px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  select option { background: var(--surface2); }
  .modal-footer { display: flex; gap: 10px; justify-content: space-between; margin-top: 20px; }
  .delete-btn-modal { background: none; border: 1px solid var(--border); color: var(--red); cursor: pointer; padding: 7px 14px; border-radius: 8px; font-size: 13px; }
  .delete-btn-modal:hover { background: rgba(239,68,68,0.1); }
</style>
</head>

const PILLAR_COLORS = {

const PILLAR_SHORT = {

  'External·Editorial':        'EXT · EDITORIAL',

// STATE

function loadTasks() {
  const s = localStorage.getItem('board_tasks');
  return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
}
function saveTasks() { localStorage.setItem('board_tasks', JSON.stringify(tasks)); }
let tasks = loadTasks();
let editingId = null;

// ============================================================
// KANBAN
// ============================================================
function renderKanban() {
  let html = '';
  STATUS_COLS.forEach(col => {
    const colTasks = tasks.filter(t => t.status === col.key);
    const cards = colTasks.map(t => {
      const color = PILLAR_COLORS[t.pillar] || '#888';
      const parts = t.pillar.split('·').map(s => s.trim());
      const group = parts[0];
      const name  = parts[1] || parts[0];
      return `
      <div class="task-card" onclick="openEditTask('${t.id}')"
           style="border-top: 5px solid ${color}; background: linear-gradient(175deg, ${color}22 0%, #22263a 38%);">
        <div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap">
          <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:#2a2d40;color:#94a3b8;letter-spacing:0.06em;text-transform:uppercase">${group}</span>
          <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:${color}2a;color:${color};letter-spacing:0.06em;text-transform:uppercase">${name}</span>
        </div>
        <div class="task-title">${t.title}</div>
        ${t.start || t.end ? `<div class="task-dates">${t.start || ''}${t.end ? ' → ' + t.end : ''}</div>` : ''}

      </div>`;
    }).join('');
    html += `
      <div class="column">
        <div class="col-header">
          <span class="col-title">${col.label}</span>
          <span class="col-count">${colTasks.length}</span>
        </div>
        <div class="cards-list">${cards}</div>
      </div>`;
  });
  document.getElementById('kanban').innerHTML = html;
}

// ============================================================
// GANTT
// ============================================================
function renderGantt() {
  const el = document.getElementById('gantt');
  // Determine date range
  const GANTT_START = new Date('2026-05-01');
  const GANTT_END   = new Date('2026-12-31');
  const totalDays = Math.round((GANTT_END - GANTT_START) / 86400000);

  // Build month headers
  const months = [];
  let cur = new Date(GANTT_START);
  while (cur <= GANTT_END) {
    const label = cur.toLocaleDateString('en-GB', { month: 'short', year: '2-digit' });
    const start = Math.round((cur - GANTT_START) / 86400000);
    const next = new Date(cur); next.setMonth(next.getMonth() + 1);
    const days = Math.round((Math.min(next, GANTT_END) - cur) / 86400000);
    months.push({ label, startDay: start, days });
    cur = next;
  }

  const LABEL_W = 220;
  const COL_TOTAL = 800; // px for the timeline
  const pxPerDay = COL_TOTAL / totalDays;
  const TODAY_OFFSET = Math.max(0, Math.round((new Date() - GANTT_START) / 86400000));

  // Header
  let headerHTML = `<div class="gantt-header" style="display:grid;grid-template-columns:${LABEL_W}px 1fr">
    <div></div>
    <div style="position:relative;display:flex">`;
  months.forEach(m => {
    headerHTML += `<div class="gantt-month-label" style="width:${m.days * pxPerDay}px;flex-shrink:0">${m.label}</div>`;
  });
  headerHTML += '</div></div>';

  // Rows
  let rowsHTML = '';
  tasks.forEach(t => {
    const color = PILLAR_COLORS[t.pillar] || '#888';
    let barLeft = 0, barWidth = 0;
    if (t.start && t.end) {
      const s = new Date(t.start), e = new Date(t.end);
      barLeft = Math.max(0, Math.round((s - GANTT_START) / 86400000)) * pxPerDay;
      const endOffset = Math.min(totalDays, Math.round((e - GANTT_START) / 86400000));
      barWidth = Math.max(4, (endOffset * pxPerDay) - barLeft);
    }
    const opacity = t.status === 'done' ? 0.4 : 1;
    rowsHTML += `
      <div class="gantt-row" style="display:grid;grid-template-columns:${LABEL_W}px 1fr;border-bottom:1px solid #1e2235">
        <div class="gantt-task-label" onclick="openEditTask('${t.id}')" title="${t.title}">${t.title}</div>
        <div style="position:relative;height:36px;display:flex;align-items:center">
          ${months.map(m => `<div class="gantt-grid-line" style="left:${m.startDay * pxPerDay}px"></div>`).join('')}
          <div class="today-line" style="left:${TODAY_OFFSET * pxPerDay}px"></div>
          ${barLeft !== undefined && barWidth > 0 ? `
          <div class="gantt-bar" style="position:absolute;left:${barLeft}px;width:${barWidth}px;background:${color};opacity:${opacity}" onclick="openEditTask('${t.id}')">
            ${barWidth > 60 ? t.title.slice(0,30) : ''}
          </div>` : `<span style="font-size:11px;color:var(--muted);padding-left:8px">No dates set</span>`}
        </div>
      </div>`;
  });

  el.innerHTML = `<div class="gantt-wrap">${headerHTML}<div>${rowsHTML}</div></div>`;
}

// ============================================================
// LEGEND
// ============================================================
function renderLegend() {
  const html = Object.entries(PILLAR_COLORS).map(([p, c]) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${p}</div>`
  ).join('');
  document.getElementById('legend').innerHTML = html;
}

let currentView = 'kanban';
function switchView(v) {
  currentView = v;
  document.getElementById('kanban').style.display = v === 'kanban' ? 'grid' : 'none';
  document.getElementById('gantt').style.display  = v === 'gantt'  ? 'block' : 'none';
  document.getElementById('btn-kanban').classList.toggle('active', v === 'kanban');
  document.getElementById('btn-gantt').classList.toggle('active', v === 'gantt');
  if (v === 'gantt') renderGantt();
}

// ============================================================
// MODAL
// ============================================================
function openNewTask() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'New Task';
  document.getElementById('modal-delete').style.display = 'none';
  document.getElementById('tf-title').value = '';
  document.getElementById('tf-pillar').value = 'Internal·Technical';
  document.getElementById('tf-priority').value = 'medium';
  document.getElementById('tf-status').value = 'not_started';
  document.getElementById('tf-owner').value = '';
  document.getElementById('tf-start').value = '';
  document.getElementById('tf-end').value = '';
  document.getElementById('tf-notes').value = '';
  document.getElementById('task-modal').classList.add('open');
}

function openEditTask(id) {
  editingId = id;
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('modal-title').textContent = 'Edit Task';
  document.getElementById('modal-delete').style.display = 'inline-block';
  document.getElementById('tf-title').value = t.title;
  document.getElementById('tf-pillar').value = t.pillar;
  document.getElementById('tf-priority').value = t.priority;
  document.getElementById('tf-status').value = t.status;
  document.getElementById('tf-owner').value = t.owner || '';
  document.getElementById('tf-start').value = t.start || '';
  document.getElementById('tf-end').value = t.end || '';
  document.getElementById('tf-notes').value = t.notes || '';
  document.getElementById('task-modal').classList.add('open');
}

function closeModal() { document.getElementById('task-modal').classList.remove('open'); }

function saveTask() {
  const t = {
    id: editingId || 't' + Date.now(),
    title: document.getElementById('tf-title').value.trim(),
    pillar: document.getElementById('tf-pillar').value,
    priority: document.getElementById('tf-priority').value,
    status: document.getElementById('tf-status').value,
    owner: document.getElementById('tf-owner').value.trim(),
    start: document.getElementById('tf-start').value,
    end: document.getElementById('tf-end').value,
    notes: document.getElementById('tf-notes').value.trim(),
  };
  if (!t.title) { alert('Please enter a title.'); return; }
  if (editingId) {
    const idx = tasks.findIndex(x => x.id === editingId);
    if (idx >= 0) tasks[idx] = t;
  } else {
    tasks.push(t);
  }
  saveTasks();
  closeModal();
  renderAll();
}

function deleteTask() {
  if (!editingId || !confirm('Delete this task?')) return;
  tasks = tasks.filter(t => t.id !== editingId);
  saveTasks();
  closeModal();
  renderAll();
}

// ============================================================
// INIT
// ============================================================
function renderAll() {
  renderLegend();
  renderKanban();
  if (currentView === 'gantt') renderGantt();
}

// Click outside modal to close
document.getElementById('task-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

renderAll();
</script>
</body>
</html>
